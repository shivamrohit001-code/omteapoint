<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Om Tea Point - Kitchen Admin</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #ffffff; --primary: #3498db; --ready: #27ae60; --pending: #f1c40f; --danger: #e74c3c; --accent: #b22222; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        header { background: #000; padding: 10px; text-align: center; border-bottom: 2px solid var(--primary); margin-bottom: 10px; }
        .section-label { background: #333; padding: 10px 15px; font-weight: bold; border-left: 5px solid var(--primary); margin: 25px 0 12px 0; font-size: 1.1rem; color: #eee; }
        
        #pending-orders, #ready-orders { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

        .order-card { background: var(--card); border-radius: 10px; padding: 12px; border: 1px solid #444; display: flex; flex-direction: column; min-height: 250px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .order-header { border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 10px; text-align: center; }
        .table-box { background: var(--primary); color: white; padding: 6px; border-radius: 6px; font-weight: 900; font-size: 1.3rem; display: block; margin-bottom: 8px; }
        .total-amount { font-size: 2rem; color: var(--pending); font-weight: 900; display: block; }

        .items-list { list-style: none; padding: 0; margin: 8px 0; flex-grow: 1; overflow-y: auto; max-height: 140px; }
        .items-list li { padding: 6px 0; border-bottom: 1px solid #2a2a2a; color: #fff; font-size: 1.1rem; }
        
        .footer-btns { display: flex; gap: 8px; margin-top: 10px; }
        button { flex: 1; padding: 10px 4px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .btn-ready { background: var(--ready); color: white; }
        .btn-paid { background: var(--primary); color: white; }
        .btn-edit { background: #444; color: white; }
        .btn-delete { background: var(--danger); flex: 0 0 45px; color: white; }

        #menu-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; }
        .menu-content { flex: 1; overflow-y: auto; padding: 15px; }
        .cat-header { background: var(--accent); color: white; padding: 8px; margin: 15px 0 5px 0; border-radius: 4px; font-size: 1rem; text-align: center; }
        .menu-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #333; align-items: center; background: #222; margin-bottom: 2px; }
        .qty-box { display: flex; align-items: center; gap: 15px; }
        .m-btn { padding: 10px 20px; font-size: 1.2rem; background: #444; color: white; border-radius: 6px; }
        .save-bar { background: #000; padding: 20px; text-align: center; border-top: 2px solid var(--primary); }

        @media (max-width: 1000px) { #pending-orders, #ready-orders { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { #pending-orders, #ready-orders { grid-template-columns: 1fr; } }
    </style>
</head>
<body onclick="enableAudio()">

    <header><h2 style="margin:0; font-size: 1.4rem;">👨‍🍳 ઓમ ટી પોઈન્ટ - કિચન</h2></header>
    
    <audio id="order-sound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/941/941-preview.mp3" type="audio/mpeg">
    </audio>

    <div class="section-label">નવા ઓર્ડર 📥</div>
    <div id="pending-orders"></div>

    <div class="section-label">પેમેન્ટ બાકી 💸</div>
    <div id="ready-orders"></div>

    <div id="menu-modal">
        <div style="padding: 15px; background: #222; display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin:0;">ઓર્ડર સુધારો</h3>
            <button onclick="closeEdit()" style="background:none; color:white; font-size: 2.5rem; border:none; cursor:pointer;">✕</button>
        </div>
        <div class="menu-content" id="full-menu-list"></div>
        <div class="save-bar"><button class="btn-ready" onclick="saveEdit()" style="width: 90%; font-size: 1.3rem;">સુધારો સેવ કરો</button></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://omteapoint-30fd7-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const menuData = [
            { name: "ચા", cat: "ગરમ પીણાં" }, { name: "કોફી", cat: "ગરમ પીણાં" }, { name: "પાણી ની બોટલ", cat: "ગરમ પીણાં" }, { name: "દૂધ", cat: "ગરમ પીણાં" }, { name: "બોર્નવીટા", cat: "ગરમ પીણાં" }, { name: "ગરમ બોર્નવીટા", cat: "ગરમ પીણાં" }, { name: "હળદળ વાળુ દૂધ", cat: "ગરમ પીણાં" }, { name: "છાશ", cat: "ગરમ પીણાં" }, { name: "દહીં", cat: "ગરમ પીણાં" }, { name: "એક્સ્ટ્રા બટર/બોર્નવીટા", cat: "ગરમ પીણાં" },
            { name: "સાદા પૌવા", cat: "પૌવા" }, { name: "સાદા ડુંગળી પૌવા", cat: "પૌવા" }, { name: "ચટણી પૌવા", cat: "પૌવા" }, { name: "બટાકા પૌવા", cat: "પૌવા" }, { name: "બટર પૌવા", cat: "પૌવા" }, { name: "મસાલા પૌવા", cat: "પૌવા" }, { name: "મસાલા બટાકા પૌવા", cat: "પૌવા" }, { name: "મસાલા બટર પૌવા", cat: "પૌવા" }, { name: "મસાલા બટર બટાકા પૌવા", cat: "પૌવા" },
            { name: "સાદા થેપલા", cat: "થેપલા" }, { name: "બટર થેપલા", cat: "થેપલા" }, { name: "મસાલા થેપલા", cat: "થેપલા" }, { name: "બટર સેવ થેપલા", cat: "થેપલા" }, { name: "બટર સેવ ચીઝ થેપલા", cat: "થેપલા" }, { name: "મસાલા બટર ચીઝ થેપલા", cat: "થેપલા" },
            { name: "સાદી ભાખરી", cat: "ભાખરી" }, { name: "બટર ભાખરી", cat: "ભાખરી" }, { name: "ફ્રાય ભાખરી", cat: "ભાખરી" }, { name: "મસાલા ભાખરી", cat: "ભાખરી" }, { name: "સેવ ફ્રાય ભાખરી", cat: "ભાખરી" }, { name: "ચીઝ મસાલા ભાખરી", cat: "ભાખરી" },
            { name: "સેવ વઘારીયા", cat: "વઘારીયા" }, { name: "બટર સેવ વઘારીયા", cat: "વઘારીયા" }, { name: "મસાલા વઘારીયા", cat: "વઘારીયા" },
            { name: "આલુ પરોઠા", cat: "આલુ પરોઠા" }, { name: "બટર આલુ પરોઠા", cat: "આલુ પરોઠા" }, { name: "ચીઝ આલુ પરોઠા", cat: "આલુ પરોઠા" }, { name: "મસાલા ચીઝ આલુ પરોઠા", cat: "આલુ પરોઠા" },
            { name: "મેગી", cat: "મેગી" }, { name: "મસાલા મેગી", cat: "મેગી" }, { name: "બટર મેગી", cat: "મેગી" }, { name: "ચીઝ મેગી", cat: "મેગી" },
            { name: "સમોસા", cat: "સમોસા" }, { name: "સેવ સમોસા", cat: "સમોસા" }, { name: "સેવ દહીં સમોસા", cat: "સમોસા" }, { name: "સેવ ચીઝ સમોસા", cat: "સમોસા" },
            { name: "ખાટીયા ઢોકળા", cat: "ખાટીયા" },
            { name: "બટર બન", cat: "નાસ્તો" }, { name: "મસાલા બટર બન", cat: "નાસ્તો" }, { name: "મસાલા સેન્ડવીચ", cat: "નાસ્તો" }, { name: "બટર સેન્ડવીચ", cat: "નાસ્તો" }, { name: "ચીઝ મસાલા સેન્ડવીચ", cat: "નાસ્તો" }, { name: "બ્રેડ બટર", cat: "નાસ્તો" }, { name: "ગરમ બ્રેડ બટર", cat: "નાસ્તો" },
            { name: "સાદો પફ", cat: "પફ" }, { name: "સાદો સેવ પફ", cat: "પફ" }, { name: "મસાલા પફ", cat: "પફ" }, { name: "સીંગ મસાલા પફ", cat: "પફ" }, { name: "બટર પફ", cat: "પફ" }, { name: "બટર સેવ પફ", cat: "પફ" }, { name: "સાદો ચીઝ પફ", cat: "પફ" }, { name: "બટર સીંગ મસાલા પફ", cat: "પફ" }, { name: "બટર મસાલા ચીઝ પફ", cat: "પફ" }, { name: "બટર ચીઝ પફ", cat: "પફ" }, { name: "બટર ચીઝ સીંગ મસાલા પફ", cat: "પફ" },
            { name: "પંજાબી પફ", cat: "પંજાબી પફ" }, { name: "પંજાબી સેવ પફ", cat: "પંજાબી પફ" }, { name: "પંજાબી બટર પફ", cat: "પંજાબી પફ" }, { name: "પંજાબી બટર સેવ પફ", cat: "પંજાબી પફ" }, { name: "પંજાબી ચીઝ પફ", cat: "પંજાબી પફ" }, { name: "પંજાબી બટર ચીઝ પફ", cat: "પંજાબી પફ" },
            { name: "ચાઈનીઝ પફ", cat: "ચાઈનીઝ પફ" }, { name: "ચાઈનીઝ સેવ પફ", cat: "ચાઈનીઝ પફ" }, { name: "ચાઈનીઝ બટર પફ", cat: "ચાઈનીઝ પફ" }, { name: "ચાઈનીઝ બટર સેવ પફ", cat: "ચાઈનીઝ પફ" }, { name: "ચાઈનીઝ ચીઝ પફ", cat: "ચાઈનીઝ પફ" }, { name: "ચાઈનીઝ બટર ચીઝ પફ", cat: "ચાઈનીઝ પફ" },
            { name: "બટાકાની સુકીભાજી", cat: "સૂકીભાજી - ખીચડી" }, { name: "દહીં ચેવડો", cat: "સૂકીભાજી - ખીચડી" }, { name: "સાબુદાણાની ખીચડી", cat: "સૂકીભાજી - ખીચડી" }, { name: "ફરાળી ચેવડો", cat: "સૂકીભાજી - ખીચડી" },
            { name: "કડકડિયા", cat: "ચાટ વિભાગ" }, { name: "દાબેલા ચણા ચાટ", cat: "ચાટ વિભાગ" }, { name: "ચણા દાળ ચાટ", cat: "ચાટ વિભાગ" }
        ];

        let isFirstLoad = true;
        let lastOrdersCount = 0;
        let audioEnabled = false;

        function playSharpSound() {
            const sound = document.getElementById('order-sound');
            sound.currentTime = 0;
            sound.play().catch(e => console.log("Sound error"));
        }

        function enableAudio() { if (!audioEnabled) { playSharpSound(); audioEnabled = true; } }

        database.ref('orders').on('value', (snap) => {
            const pendingDiv = document.getElementById('pending-orders');
            const readyDiv = document.getElementById('ready-orders');
            const orders = snap.val() || {};
            const currentOrdersCount = Object.keys(orders).length;

            // માત્ર નવો ઓર્ડર ઉમેરાય ત્યારે જ અવાજ (Paid/Ready વખતે નહીં)
            if (!isFirstLoad && currentOrdersCount > lastOrdersCount) {
                playSharpSound();
            }
            
            lastOrdersCount = currentOrdersCount;
            isFirstLoad = false;

            pendingDiv.innerHTML = ''; readyDiv.innerHTML = '';
            Object.keys(orders).forEach(key => {
                const o = orders[key];
                if(o.status === 'completed') return;
                const card = document.createElement('div');
                card.className = 'order-card';
                card.innerHTML = `
                    <div class="order-header"><span class="table-box">TABLE - ${o.table}</span><span class="total-amount">₹${o.total}</span></div>
                    <ul class="items-list">${o.items.map(i => `<li>• ${i}</li>`).join('')}</ul>
                    <div class="footer-btns">
                        <button class="btn-edit" onclick="openEdit('${key}')">✏️</button>
                        ${o.status === 'pending' ? `<button class="btn-ready" onclick="updateStatus('${key}', 'ready')">READY</button>` : `<button class="btn-paid" onclick="completeOrder('${key}')">PAID</button>`}
                        <button class="btn-delete" onclick="deleteOrder('${key}')">🗑️</button>
                    </div>`;
                if (o.status === 'pending') pendingDiv.appendChild(card);
                else readyDiv.appendChild(card);
            });
        });

        function updateStatus(key, status) { database.ref('orders/' + key).update({ status: status }); }
        function completeOrder(key) { if(confirm("PAID?")) database.ref('orders/' + key).update({ status: 'completed' }).then(()=>database.ref('orders/'+key).remove()); }
        function deleteOrder(key) { if(confirm("DELETE?")) database.ref('orders/' + key).remove(); }

        let currentEditKey = null;
        let tempCart = {};
        function openEdit(key) {
            currentEditKey = key; tempCart = {};
            database.ref('orders/' + key).once('value', snap => {
                const o = snap.val();
                o.items.forEach(line => {
                    const [q, ...n] = line.split('x ');
                    tempCart[n.join('x ')] = parseInt(q);
                });
                renderEditMenu();
                document.getElementById('menu-modal').style.display = 'flex';
            });
        }
        function renderEditMenu() {
            const list = document.getElementById('full-menu-list');
            list.innerHTML = '';
            const categories = [...new Set(menuData.map(m => m.cat))];
            categories.forEach(cat => {
                list.innerHTML += `<div class="cat-header">${cat}</div>`;
                menuData.filter(m => m.cat === cat).forEach(item => {
                    const qty = tempCart[item.name] || 0;
                    list.innerHTML += `<div class="menu-row"><span>${item.name}</span><div class="qty-box"><button class="m-btn" onclick="updateTempQty('${item.name}', -1)">-</button><b id="m-qty-${item.name}">${qty}</b><button class="m-btn" onclick="updateTempQty('${item.name}', 1)">+</button></div></div>`;
                });
            });
        }
        function updateTempQty(n, v) {
            tempCart[n] = (tempCart[n] || 0) + v;
            if(tempCart[n] < 0) tempCart[n] = 0;
            document.getElementById(`m-qty-${n}`).innerText = tempCart[n];
        }
        function saveEdit() {
            const newItems = Object.entries(tempCart).filter(([n, q]) => q > 0).map(([n, q]) => `${q}x ${n}`);
            database.ref('orders/' + currentEditKey).update({ items: newItems }).then(() => {
                playSharpSound(); // એડિટ સેવ થાય ત્યારે અવાજ આવશે
                closeEdit();
            });
        }
        function closeEdit() { document.getElementById('menu-modal').style.display = 'none'; }
    </script>
</body>
</html>
