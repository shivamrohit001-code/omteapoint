<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Om Tea Point - KITCHEN</title>
    <style>
        :root { --primary: #003366; --bg: #1a1a1a; --success: #28a745; --danger: #dc3545; --parcel: #ff8c00; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: white; }
        header { background: #000; padding: 15px; text-align: center; border-bottom: 3px solid var(--primary); }
        #audio-unlock { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #audio-unlock button { padding: 20px 40px; font-size: 1.5rem; cursor: pointer; background: var(--success); color: white; border: none; border-radius: 10px; }
        .container { padding: 20px; max-width: 1400px; margin: auto; }
        .section-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #444; margin-top: 30px; padding-bottom: 10px; }
        .display-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .order-card { background: #fff; color: #222; border-left: 10px solid #ffc107; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .order-card.is-parcel { border-left-color: var(--parcel); }
        .order-header { display: flex; justify-content: space-between; font-weight: 900; font-size: 1.3rem; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .item-list { list-style: none; padding: 0; margin: 15px 0; font-size: 1.2rem; }
        .order-footer { border-top: 2px dashed #ccc; padding-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-done { background: var(--success); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1.1rem; }
        .history-card { background: #333; color: #bbb; border-left-color: #555; }
        .btn-clear { background: var(--danger); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="audio-unlock"><button onclick="startKitchen()">START SYSTEM</button></div>
    <header><h1>OM TEA POINT - KITCHEN</h1></header>
    <div class="container">
        <section>
            <div class="section-header"><h2>Live Kitchen Orders</h2></div>
            <div id="kitchen-display" class="display-grid"></div>
        </section>
        <section>
            <div class="section-header">
                <h2>Completed History</h2>
                <button class="btn-clear" onclick="clearHistory()">CLEAR HISTORY</button>
            </div>
            <div id="history-display" class="display-grid"></div>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://omteapoint-30fd7-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let knownIds = new Set();
        const notificationSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        function startKitchen() {
            document.getElementById('audio-unlock').style.display = 'none';
            database.ref('orders/').on('value', (snap) => {
                const data = snap.val();
                const all = data ? Object.entries(data).map(([k, v]) => ({...v, fKey: k})) : [];
                render(all);
            });
        }

        function render(all) {
            const kitchen = document.getElementById('kitchen-display');
            const history = document.getElementById('history-display');
            const pending = all.filter(o => o.status === 'pending');
            const done = all.filter(o => o.status === 'completed').sort((a,b) => b.id - a.id);

            let alert = false;
            pending.forEach(o => { if(!knownIds.has(o.id)){ knownIds.add(o.id); alert = true; } });
            if(alert) notificationSound.play().catch(() => {});

            kitchen.innerHTML = pending.length ? '' : '<p>Waiting for orders...</p>';
            pending.forEach(o => kitchen.innerHTML += card(o, true));

            history.innerHTML = done.length ? '' : '<p>No history.</p>';
            done.slice(0, 10).forEach(o => history.innerHTML += card(o, false));
        }

        function card(o, live) {
            const time = new Date(o.id).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            return `<div class="order-card ${!live ? 'history-card' : ''} ${o.table === 'Parcel' ? 'is-parcel' : ''}">
                <div class="order-header"><span>${o.table === 'Parcel' ? '📦 PARCEL' : '🪑 T-' + o.table}</span><span>${time}</span></div>
                <ul class="item-list">${o.items.map(i => `<li>${i}</li>`).join('')}</ul>
                <div class="order-footer"><span>Total:</span><span style="font-weight:bold">₹${o.total}</span></div>
                ${live ? `<button class="btn-done" onclick="complete('${o.fKey}')">DONE</button>` : ''}
            </div>`;
        }

        function complete(key) { database.ref('orders/' + key).update({ status: 'completed' }); }

        function clearHistory() {
            if(confirm("Clear history?")) {
                database.ref('orders/').once('value', snap => {
                    snap.forEach(child => { if(child.val().status === 'completed') child.ref.remove(); });
                });
            }
        }
    </script>
</body>
</html>
