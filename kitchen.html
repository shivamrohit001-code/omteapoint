<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Om Tea Point - Admin Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0a0a0a; --card: #161616; --text: #e0e0e0; 
            --primary: #ffd700; --ready: #2ecc71; --danger: #ff4757; 
        }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }

        /* --- Header --- */
        header { 
            background: #000; padding: 15px; display: flex; align-items: center;
            border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 900;
        }
        .menu-btn { 
            background: none; border: none; color: var(--primary); font-size: 1.8rem; 
            cursor: pointer; margin-right: 15px;
        }
        header h2 { margin: 0; font-size: 1.2rem; flex-grow: 1; text-align: center; color: var(--primary); }

        /* --- Sidebar Drawer --- */
        .sidebar {
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%;
            background: #111; border-right: 1px solid #333; z-index: 1000;
            transition: 0.3s; padding: 20px; box-shadow: 10px 0 20px rgba(0,0,0,0.5);
            display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; z-index: 999;
        }
        .sidebar-overlay.active { display: block; }

        /* Sidebar Sections */
        .sidebar h3 { color: var(--primary); border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 20px; font-size: 1.1rem; }
        .sidebar h3:first-child { margin-top: 0; }
        
        .total-sales-box {
            background: linear-gradient(145deg, #1e1e1e, #111);
            padding: 15px; border-radius: 12px; border: 1px solid var(--ready);
            text-align: center; margin-bottom: 10px;
        }
        .total-sales-box span { font-size: 0.9rem; color: #aaa; }
        .total-sales-box h4 { margin: 5px 0 0 0; font-size: 2rem; color: var(--ready); }

        #daily-summary { flex-grow: 1; overflow-y: auto; margin-top: 10px; }
        .summary-item { 
            background: #1a1a1a; padding: 8px 12px; border-radius: 8px; margin-bottom: 6px;
            display: flex; justify-content: space-between; border-left: 3px solid var(--primary); font-size: 0.9rem;
        }
        .summary-item b { color: var(--primary); }

        /* --- Orders --- */
        .content { padding: 15px; }
        .section-label { 
            background: rgba(255, 215, 0, 0.05); padding: 10px 15px; font-weight: 600; 
            border-left: 4px solid var(--primary); margin: 20px 0 10px 0; color: var(--primary);
        }
        #pending-orders, #ready-orders { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .order-card { background: var(--card); border-radius: 15px; padding: 15px; border: 1px solid #222; display: flex; flex-direction: column; }
        .table-display { font-size: 1.4rem; font-weight: 800; color: var(--primary); }
        .items-list { list-style: none; padding: 0; margin: 10px 0; flex-grow: 1; }
        .items-list li { padding: 6px 0; border-bottom: 1px solid #222; color: #ccc; display: flex; justify-content: space-between; }
        .total-amount { font-size: 1.5rem; color: var(--ready); font-weight: 800; }

        .footer-btns { display: flex; gap: 8px; margin-top: 12px; }
        button { padding: 10px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-family: 'Poppins', sans-serif; }
        .btn-ready { background: var(--ready); color: #000; flex: 2; }
        .btn-paid { background: var(--primary); color: #000; flex: 2; }
        .btn-edit { background: #333; color: white; flex: 1; }
        .btn-delete { background: var(--danger); color: white; flex: 0 0 45px; }
        .btn-clear-all { background: var(--danger); width: 100%; margin-top: 20px; color: white; }

        /* Modal */
        #menu-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1100; backdrop-filter: blur(10px); }
        .menu-content { max-width: 500px; margin: auto; height: 80vh; overflow-y: auto; padding: 20px; }
        .cat-header { background: var(--primary); color: #000; padding: 8px; margin-top: 15px; border-radius: 5px; text-align: center; font-weight: 700; }
        .menu-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #222; background: #111; margin: 4px 0; border-radius: 5px; }
        .qty-box { display: flex; align-items: center; gap: 12px; }
        .m-btn { width: 30px; height: 30px; border-radius: 50%; background: var(--primary); color: #000; border: none; font-weight: bold; }
        .save-bar { position: sticky; bottom: 0; background: #000; padding: 15px; text-align: center; border-top: 1px solid var(--primary); }
    </style>
</head>

        let isFirstLoad = true, lastOrdersCount = 0, audioEnabled = false;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.querySelector('.sidebar-overlay').classList.toggle('active');
        }

        function playSharpSound() {
            const sound = document.getElementById('order-sound');
            sound.currentTime = 0; sound.play().catch(e => {});
        }

        function enableAudio() { if (!audioEnabled) { playSharpSound(); audioEnabled = true; } }

        // --- Orders Listen ---
        database.ref('orders').on('value', (snap) => {
            const pendingDiv = document.getElementById('pending-orders');
            const readyDiv = document.getElementById('ready-orders');
            const orders = snap.val() || {};
            const currentOrdersCount = Object.keys(orders).length;
            if (!isFirstLoad && currentOrdersCount > lastOrdersCount) playSharpSound();
            lastOrdersCount = currentOrdersCount; isFirstLoad = false;
            pendingDiv.innerHTML = ''; readyDiv.innerHTML = '';
            Object.keys(orders).forEach(key => {
                const o = orders[key]; if(o.status === 'completed') return;
                let tableText = (o.table === 'Parcel') ? "🥡 PARCEL" : "🪑 TABLE " + o.table;
                const card = document.createElement('div');
                card.className = 'order-card';
                card.innerHTML = `
                    <div class="order-header"><div class="table-display">${tableText}</div></div>
                    <ul class="items-list">${o.items.map(i => `<li><span>${i.split('x ')[1]}</span> <b>x${i.split('x ')[0]}</b></li>`).join('')}</ul>
                    <div class="order-footer-info"><span>Total:</span><span class="total-amount">₹${o.total}</span></div>
                    <div class="footer-btns">
                        <button class="btn-edit" onclick="openEdit('${key}')">✏️</button>
                        ${o.status === 'pending' ? `<button class="btn-ready" onclick="updateStatus('${key}', 'ready')">READY</button>` : `<button class="btn-paid" onclick="completeOrder('${key}')">PAID</button>`}
                        <button class="btn-delete" onclick="deleteOrder('${key}')">🗑️</button>
                    </div>`;
                if (o.status === 'pending') pendingDiv.appendChild(card);
                else readyDiv.appendChild(card);
            });
        });

        // --- Daily Summary & Sales Listen ---
        database.ref('daily_report').on('value', (snap) => {
            const summaryDiv = document.getElementById('daily-summary');
            const salesDisplay = document.getElementById('grand-total-display');
            const data = snap.val() || {};
            
            // Total Sales Update
            const totalSales = data.total_cash || 0;
            salesDisplay.innerText = "₹" + totalSales;

            // Items Count Update
            const items = data.items || {};
            const itemsArr = Object.entries(items);
            if(itemsArr.length > 0) {
                summaryDiv.innerHTML = itemsArr.map(([name, qty]) => `
                    <div class="summary-item"><span>${name}</span><b>${qty}</b></div>
                `).join('');
            } else {
                summaryDiv.innerHTML = '<span style="color:#666">કોઈ ડેટા નથી.</span>';
            }
        });

        function updateStatus(key, status) { database.ref('orders/' + key).update({ status: status }); }

        function completeOrder(key) {
            if(confirm("PAID?")) {
                database.ref('orders/' + key).once('value', snap => {
                    const o = snap.val();
                    if(o) {
                        // Update Cash
                        database.ref('daily_report/total_cash').transaction(curr => (curr || 0) + parseInt(o.total));
                        // Update Items Count
                        o.items.forEach(line => {
                            const [qty, ...nameArr] = line.split('x ');
                            const itemName = nameArr.join('x ');
                            database.ref('daily_report/items/' + itemName).transaction(curr => (curr || 0) + parseInt(qty));
                        });
                        database.ref('orders/' + key).remove();
                    }
                });
            }
        }

        function clearDailyData() {
            if(confirm("શું તમે આજની કમાણી અને આઈટમ રિપોર્ટ ઝીરો કરવા માંગો છો?")) {
                database.ref('daily_report').remove();
                toggleSidebar();
            }
        }

        function deleteOrder(key) { if(confirm("DELETE?")) database.ref('orders/' + key).remove(); }

        // --- Edit Logic ---
        let currentEditKey = null, tempCart = {};
        function openEdit(key) {
            currentEditKey = key; tempCart = {};
            database.ref('orders/' + key).once('value', snap => {
                const o = snap.val();
                o.items.forEach(line => {
                    const [q, ...n] = line.split('x ');
                    tempCart[n.join('x ')] = parseInt(q);
                });
                renderEditMenu();
                document.getElementById('menu-modal').style.display = 'block';
            });
        }
        function renderEditMenu() {
            const list = document.getElementById('full-menu-list');
            list.innerHTML = '';
            const categories = [...new Set(menuData.map(m => m.cat))];
            categories.forEach(cat => {
                list.innerHTML += `<div class="cat-header">${cat}</div>`;
                menuData.filter(m => m.cat === cat).forEach(item => {
                    const qty = tempCart[item.name] || 0;
                    list.innerHTML += `<div class="menu-row"><span>${item.name}</span><div class="qty-box"><button class="m-btn" onclick="updateTempQty('${item.name}', -1)">-</button><b id="m-qty-${item.name}">${qty}</b><button class="m-btn" onclick="updateTempQty('${item.name}', 1)">+</button></div></div>`;
                });
            });
        }
        function updateTempQty(n, v) {
            tempCart[n] = (tempCart[n] || 0) + v;
            if(tempCart[n] < 0) tempCart[n] = 0;
            document.getElementById(`m-qty-${n}`).innerText = tempCart[n];
        }
        function saveEdit() {
            let newTotal = 0; const newItems = [];
            Object.entries(tempCart).forEach(([name, qty]) => {
                if (qty > 0) {
                    const itemObj = menuData.find(m => m.name === name);
                    newTotal += ((itemObj ? itemObj.price : 0) * qty);
                    newItems.push(`${qty}x ${name}`);
                }
            });
            database.ref('orders/' + currentEditKey).update({ items: newItems, total: newTotal }).then(() => {
                playSharpSound(); closeEdit();
            });
        }
        function closeEdit() { document.getElementById('menu-modal').style.display = 'none'; }
    </script>
</body>
</html>
